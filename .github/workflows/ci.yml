name: CI — Tests

# Quando é que este pipeline corre?
on:
  push:
    branches: [ main, develop ]   # em qualquer push para estas branches
  pull_request:
    branches: [ main ]            # em qualquer PR para a main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest        # corre numa VM Ubuntu gratuita do GitHub

    # Inicia um PostgreSQL real para os testes
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB:       taskdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Vai buscar o código do repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"             # cache das dependências — pipeline mais rápido

      # 3. Instala as dependências
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Corre os testes com relatório de cobertura
      - name: Run tests
        env:
          DATABASE_URL: postgresql://taskuser:taskpass@localhost:5432/taskdb
        run: |
          pytest tests/ -v \
            --tb=short \
            --junit-xml=test-results.xml

      # 5. Publica o relatório de testes no GitHub (aparece no PR)
      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()               # corre mesmo se os testes falharem
        with:
          name: test-results
          path: test-results.xml